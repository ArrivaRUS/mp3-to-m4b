      <stop offset="0%" stop-color="#101A22"/>
      <stop offset="100%" stop-color="#080C11"/>
    </radialGradient>
    <linearGradient id="bpl-audio" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#34E0D2"/>
      <stop offset="100%" stop-color="#22B5E0"/>
    </linearGradient>
    <linearGradient id="bpl-m4b" x1="0%" y1="0%" x2="100%" y2="100%">
