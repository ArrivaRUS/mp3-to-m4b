<svg width="860" height="220" viewBox="0 0 860 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="mp3-to-m4b wordmark — M4B monogram">
  <defs>
    <radialGradient id="mgl-bg" cx="50%" cy="42%" r="80%">
      <stop offset="0%" stop-color="#101A22"/>
      <stop offset="100%" stop-color="#080C11"/>
    </radialGradient>
    <linearGradient id="mgl-audio" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#34E0D2"/>
      <stop offset="100%" stop-color="#22B5E0"/>
    </linearGradient>
    <linearGradient id="mgl-m4b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22B5E0"/>
      <stop offset="100%" stop-color="#4A6BFF"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="860" height="220" rx="30" fill="url(#mgl-bg)"/>

  <!-- mini mark: compact "4" + play in a rounded tile -->
  <g transform="translate(40,52)">
    <rect x="0" y="0" width="116" height="116" rx="28" fill="#0E1A22"/>
    <path d="M70 22 L94 22 L94 96 L70 96 L70 74 L24 74 L24 56 L62 22 Z M70 56 L70 38 L48 56 Z" fill="url(#mgl-audio)" fill-rule="evenodd"/>
    <path d="M40 50 L40 70 L56 60 Z" fill="#EAFBFF"/>
  </g>

  <style>
    .wm { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Helvetica, Arial, sans-serif; font-weight: 700; }
  </style>

  <text x="192" y="128" class="wm" font-size="68" fill="#EAF6FA" letter-spacing="-2">mp3</text>

  <g>
    <path d="M370 94 L422 94" stroke="url(#mgl-audio)" stroke-width="10" stroke-linecap="round"/>
    <path d="M410 80 L428 94 L410 108" stroke="url(#mgl-audio)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <text x="450" y="128" class="wm" font-size="68" fill="url(#mgl-m4b)" letter-spacing="-2">m4b</text>

  <text x="194" y="168" class="wm" font-size="15" fill="#6E8390" letter-spacing="6" font-weight="600">MP3 &#8594; M4B AUDIOBOOK BUILDER</text>
